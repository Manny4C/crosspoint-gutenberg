name: Release (build + publish)

# Tag a commit (e.g. `git tag v1.0.0 && git push --tags`) to build release
# binaries and publish them as a GitHub Release — the firmware equivalent of a
# deploy. Flash firmware.bin with `pio run -t upload` or a Web Serial flasher.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO Core
        run: pip install -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Build release firmware
        run: pio run -e gh_release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/partitions.bin
            .pio/build/gh_release/firmware.elf
